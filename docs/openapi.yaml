openapi: "3.0.3"
info:
  title: Arctic Sniffer API
  description: |
    REST API for the Arctic Sniffer — a passive Modbus RTU bus monitor for the
    Arctic ECO-600 heat pump communication protocol.

    The device also streams decoded transactions over a **WebSocket** at `/ws`.
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: sslivins
    url: https://github.com/sslivins/arctic-sniffer

servers:
  - url: http://arctic-sniffer.local
    description: mDNS (local network)
  - url: http://{ip}
    description: Direct IP
    variables:
      ip:
        default: 192.168.1.100

tags:
  - name: Status
    description: Device info and statistics
  - name: Log
    description: Recent transaction history
  - name: Recording
    description: JSONL traffic capture

paths:
  /api/status:
    get:
      operationId: getStatus
      summary: Get sniffer status
      description: Returns device info, bus statistics, recording state, and WebSocket client count.
      tags: [Status]
      responses:
        "200":
          description: Current sniffer status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
              example:
                ip: "192.168.1.42"
                frames: 1254
                parse_errors: 0
                resync_bytes: 623
                skipped_total: 623
                crc_errors: 0
                transactions: 627
                recording: false
                rec_entries: 0
                rec_elapsed_ms: 0
                ws_clients: 1

  /api/log:
    get:
      operationId: getLog
      summary: Get recent transactions
      description: |
        Returns the last 100 decoded Modbus transactions as a JSON array,
        oldest first. Each transaction includes function code, register
        addresses, decoded register names, and human-readable values.
      tags: [Log]
      responses:
        "200":
          description: Array of recent transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /api/state:
    get:
      operationId: getState
      summary: Get decoded heat-pump state
      description: |
        Returns the current heat-pump state decoded by the on-device
        arctic-macon library. The sniffer maintains the raw value of every
        register seen on the wire (both the telemetry and holding windows) and
        hands the WHOLE image to `arctic::decode_state()`, which owns the
        register→field mapping. This endpoint only serializes the resulting
        `MaconState`; the client performs no register decoding.

        Temperature/electrical fields are `null` when their source register has
        not yet been observed since boot or the last snapshot clear. When the
        bus has been silent since boot, `seen` is `false` and all fields hold
        their default (zero / "Unknown").
      tags: [Log]
      responses:
        "200":
          description: Decoded MaconState
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatPumpState"

  /api/record/start:
    post:
      operationId: startRecording
      summary: Start recording
      description: |
        Begins capturing Modbus transactions to an in-memory JSONL buffer.
        Any existing recording data is cleared.
      tags: [Recording]
      responses:
        "200":
          description: Recording started
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: recording

  /api/record/stop:
    post:
      operationId: stopRecording
      summary: Stop recording
      description: Stops the active recording. Data remains in memory for download.
      tags: [Recording]
      responses:
        "200":
          description: Recording stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: stopped
                  entries:
                    type: integer
                    example: 42

  /api/record/download:
    get:
      operationId: downloadRecording
      summary: Download recording
      description: |
        Download the captured data as a JSONL file. Each line is a JSON object
        compatible with [arctic-simulator](https://github.com/sslivins/arctic-simulator)
        playback mode.
      tags: [Recording]
      responses:
        "200":
          description: JSONL capture file
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="capture.jsonl"'
          content:
            application/x-ndjson:
              schema:
                type: string
              example: |
                {"t":0,"fc":3,"addr":2100,"count":39,"values":[0,1,2]}
                {"t":500,"fc":6,"addr":2000,"value":1}

  /api/record:
    delete:
      operationId: clearRecording
      summary: Clear recording data
      description: Discards all recorded data and frees memory.
      tags: [Recording]
      responses:
        "200":
          description: Recording data cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: cleared

  /api/skipped:
    get:
      operationId: getSkipped
      summary: Raw bytes discarded during resync
      description: >-
        Returns the most-recent raw bytes discarded during frame resync (the
        stray inter-frame bytes formerly counted as "crc_errors"). Useful for
        diagnosing whether they are benign half-duplex line-turnaround bytes.
      tags: [Status]
      responses:
        "200":
          description: Captured skipped bytes (oldest-first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                   type: integer
                   description: Total bytes ever captured since boot/clear.
                   example: 623
                  count:
                   type: integer
                   description: Number of bytes returned in this response.
                   example: 256
                  bytes:
                   type: array
                   items:
                     type: object
                     properties:
                       hex:
                         type: string
                         example: "0x00"
                       dec:
                         type: integer
                         example: 0
                       ms:
                         type: integer
                         format: int64
                         description: Capture time (epoch ms or uptime ms).
                         example: 1720377600123
                       prev_len:
                         type: integer
                         description: >-
                           Byte length of the last valid Tuya frame consumed
                           immediately before this skipped byte. Use to test
                           whether a recurring stray value (e.g. 0x14) tracks the
                           preceding frame's length (a byte-count ack) or stays
                           constant (a fixed heartbeat).
                         example: 20
                       prev_dir:
                         type: string
                         description: Direction byte of the preceding frame.
                         example: "0x28"
                       prev_fc:
                         type: string
                         description: Function code of the preceding frame.
                         example: "0x03"
                       gap_before_us:
                         type: integer
                         description: >-
                           Microseconds between the last byte of the preceding
                           frame and this stray byte. Small (~one char time)
                           means the byte hugs the response tail (same
                           transmitter, i.e. the heat pump). -1 = unknown.
                         example: 2300
                       gap_after_us:
                         type: integer
                         description: >-
                           Microseconds between this stray byte and the first
                           byte of the next frame. Small means the byte leads
                           the next request (the controller drove it after an
                           RS-485 line turnaround). -1 = unknown.
                         example: 240000
    delete:
      operationId: clearSkipped
      summary: Reset counters and skipped-byte capture
      tags: [Status]
      responses:
        "200":
          description: Counters and capture cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                   type: string
                   example: cleared

components:
  schemas:
    Status:
      type: object
      properties:
        ip:
          type: string
          description: Device IP address
          example: "192.168.1.42"
        frames:
          type: integer
          description: Total Modbus frames received
          example: 1254
        parse_errors:
          type: integer
          description: >-
            Genuinely malformed or unpaired frames (parse/checksum failures,
            insane lengths, orphan responses). Stays near zero on a clean bus.
          example: 0
        resync_bytes:
          type: integer
          description: >-
            Benign inter-frame bytes discarded during resync (e.g. half-duplex
            line-turnaround bytes between a response and the next request). NOT
            errors. See GET /api/skipped for the actual byte values.
          example: 623
        skipped_total:
          type: integer
          description: Total bytes ever captured into the skipped-byte ring buffer.
          example: 623
        crc_errors:
          type: integer
          deprecated: true
          description: >-
            Deprecated alias for parse_errors, kept for downstream compatibility.
            The name is a misnomer — these are not CRC failures.
          example: 0
        transactions:
          type: integer
          description: Total paired request/response transactions
          example: 627
        recording:
          type: boolean
          description: Whether recording is currently active
          example: false
        rec_entries:
          type: integer
          description: Number of entries in the current recording
          example: 0
        rec_elapsed_ms:
          type: integer
          description: Milliseconds since recording started (0 if not recording)
          example: 0
        ws_clients:
          type: integer
          description: Number of connected WebSocket clients
          example: 1

    Transaction:
      type: object
      properties:
        ts:
          type: integer
          description: Timestamp in milliseconds (since boot)
          example: 123456
        slave:
          type: integer
          description: Modbus slave address
          example: 1
        fc:
          type: integer
          description: Modbus function code
          example: 3
        fc_name:
          type: string
          description: Human-readable function code name
          example: Read Holding Registers
        addr:
          type: integer
          description: Starting register address
          example: 2100
        count:
          type: integer
          description: Number of registers
          example: 5
        error:
          type: integer
          description: Modbus exception code (0 = none)
          example: 0
        regs:
          type: array
          description: Decoded register values
          items:
            $ref: "#/components/schemas/RegisterValue"

    RegisterValue:
      type: object
      properties:
        addr:
          type: integer
          description: Register address
          example: 2100
        raw:
          type: integer
          description: Raw 16-bit register value
          example: 250
        name:
          type: string
          description: Human-readable register name
          example: T_outdoor
        value:
          type: string
          description: Formatted value with units
          example: "25.0 °C"

    HeatPumpState:
      type: object
      description: |
        Heat-pump state decoded on-device by arctic::decode_state (MaconState).
        Temperature/electrical fields are nullable — null means the source
        register has not been observed yet.
      properties:
        seen:
          type: boolean
          description: True once at least one register has been observed on the bus.
          example: true
        mode:
          type: string
          enum: [Heating, Cooling, Unknown]
          description: Operating direction from the reversing valve (reg2049).
          example: Cooling
        mode_valid:
          type: boolean
          example: true
        running:
          type: boolean
          description: Mainboard run state (reg2007 == 0x20).
          example: true
        outputs:
          type: object
          properties:
            compressor: { type: boolean, example: true }
            pump:       { type: boolean, example: true }
            fan:        { type: boolean, example: false }
            defrost:    { type: boolean, example: false }
        fan_level:
          type: integer
          description: DC fan motor speed (reg2003 A10), raw level.
          example: 0
        setpoint_c:
          type: integer
          nullable: true
          description: Hot-water setpoint °C (reg2012).
          example: 50
        temperatures:
          type: object
          description: Whole-°C signed temperatures; each nullable.
          properties:
            tank:         { type: integer, nullable: true, example: 42 }
            outlet:       { type: integer, nullable: true, example: 45 }
            inlet:        { type: integer, nullable: true, example: 38 }
            outdoor:      { type: integer, nullable: true, example: 22 }
            indoor_coil:  { type: integer, nullable: true, example: 40 }
            ipm:          { type: integer, nullable: true, example: 55 }
            discharge:    { type: integer, nullable: true, example: 85 }
            suction:      { type: integer, nullable: true, example: 12 }
            outdoor_coil: { type: integer, nullable: true, example: 35 }
        electrical:
          type: object
          properties:
            ac_voltage:      { type: integer, nullable: true, example: 230 }
            ac_current:      { type: integer, nullable: true, example: 12 }
            dc_voltage:      { type: integer, nullable: true, example: 360 }
            primary_eev:     { type: integer, nullable: true, example: 320 }
            compressor_freq: { type: integer, nullable: true, example: 60 }
        faults:
          type: object
          properties:
            valid: { type: boolean, example: true }
            run:   { type: integer, description: reg2007 raw, example: 32 }
            ee:    { type: integer, description: reg2125 raw, example: 0 }
            comp:  { type: integer, description: reg2126 raw, example: 0 }
            elec:  { type: integer, description: reg2127 raw, example: 0 }
            ref:   { type: integer, description: reg2128 raw, example: 0 }
            text:
              type: string
              description: Library-decoded active-fault list, or "OK"/"—".
              example: OK
